<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Oeste Automatismos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8580A;--or-h:#C94708;--or-10:rgba(232,88,10,.1);--or-20:rgba(232,88,10,.2);
  --ink:#0D0D0D;--tx:#2D2D2D;--mu:#6B6B6B;--mu2:#999;
  --bd:#E2E2E2;--bd2:#C8C8C8;--sf:#F7F7F5;--wh:#fff;
  --gr:#16A34A;--gr-bg:#F0FDF4;--gr-bd:#BBF7D0;
  --rd:#DC2626;--rd-bg:#FEF2F2;--rd-bd:#FECACA;
  --r:10px;--r2:7px;--r3:5px;
  --sh:0 1px 4px rgba(0,0,0,.05),0 4px 20px rgba(0,0,0,.07);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F4F4F2;color:var(--tx);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:22px;font-weight:800;color:var(--ink);margin-bottom:8px}
.login-logo span{color:var(--or)}
.login-sub{font-size:13px;color:var(--mu);margin-bottom:28px}
.login-label{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.login-input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--or)}
.login-btn{width:100%;padding:12px;background:var(--or);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:16px;transition:background .2s}
.login-btn:hover{background:var(--or-h)}
.login-err{font-size:12px;color:var(--rd);margin-top:8px;display:none}

/* ADMIN LAYOUT */
#admin-screen{display:none}
.admin-nav{background:var(--ink);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-nav-brand{font-size:14px;font-weight:700;color:#fff}
.admin-nav-brand span{color:var(--or)}
.admin-nav-right{display:flex;align-items:center;gap:12px}
.admin-nav-link{font-size:12px;color:#aaa;font-weight:500;transition:color .2s}
.admin-nav-link:hover{color:#fff}
.btn-logout{font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-logout:hover{background:rgba(255,255,255,.2)}

.admin-wrap{max-width:1200px;margin:0 auto;padding:24px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.stat-n{font-size:28px;font-weight:800;color:var(--ink);line-height:1}
.stat-l{font-size:12px;color:var(--mu);margin-top:4px;font-weight:500}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.toolbar-title{font-size:18px;font-weight:800;color:var(--ink);flex:1;min-width:120px}
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:var(--or);color:#fff;border:none;padding:10px 18px;border-radius:var(--r2);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary:hover{background:var(--or-h);transform:translateY(-1px)}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--ink);border:1.5px solid var(--bd);padding:9px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-secondary:hover{border-color:var(--bd2);background:var(--sf)}
.search-input{padding:9px 14px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none;min-width:200px;transition:border-color .2s}
.search-input:focus{border-color:var(--or)}

/* TABELA PRODUTOS */
.table-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.table-head{display:grid;grid-template-columns:60px 1fr 100px 100px 100px 120px;gap:12px;padding:12px 20px;background:var(--sf);border-bottom:1px solid var(--bd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu)}
.table-row{display:grid;grid-template-columns:60px 1fr 100px 100px 100px 120px;gap:12px;padding:14px 20px;border-bottom:1px solid var(--bd);align-items:center;transition:background .15s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--sf)}
.prod-thumb{width:48px;height:48px;border-radius:8px;object-fit:contain;background:var(--sf);border:1px solid var(--bd)}
.prod-info{}
.prod-nome{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
.prod-marca{font-size:11px;color:var(--mu);margin-top:2px}
.prod-preco{font-size:13px;font-weight:700;color:var(--ink)}
.prod-preco-lbl{font-size:10px;color:var(--mu2);font-weight:500}
.badge-ativo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px}
.badge-ativo.sim{background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr-bd)}
.badge-ativo.nao{background:var(--rd-bg);color:var(--rd);border:1px solid var(--rd-bd)}
.row-actions{display:flex;gap:6px}
.btn-edit{padding:5px 10px;border:1.5px solid var(--bd);border-radius:6px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--ink)}
.btn-edit:hover{border-color:var(--or);color:var(--or)}
.btn-del{padding:5px 10px;border:1.5px solid transparent;border-radius:6px;background:var(--rd-bg);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--rd)}
.btn-del:hover{background:var(--rd);color:#fff}
.btn-toggle{padding:5px 10px;border:1.5px solid var(--bd);border-radius:6px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--mu)}
.btn-toggle:hover{border-color:var(--bd2);background:var(--sf)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;margin:auto;overflow:hidden}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800;color:var(--ink)}
.btn-close-modal{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mu);line-height:1;padding:4px}
.btn-close-modal:hover{color:var(--ink)}
.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.form-input,.form-select,.form-textarea{padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--or)}
.form-textarea{resize:vertical;min-height:80px}

/* Upload de imagem */
.img-upload-area{border:2px dashed var(--bd);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sf)}
.img-upload-area:hover,.img-upload-area.drag{border-color:var(--or);background:var(--or-10)}
.img-upload-area p{font-size:13px;color:var(--mu);margin-top:8px}
.img-upload-area strong{color:var(--or);font-weight:700}
.img-preview{width:100%;max-height:180px;object-fit:contain;border-radius:8px;margin-top:12px;display:none;border:1px solid var(--bd)}
#img-input{display:none}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:1000;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--gr)}
.toast.err{background:var(--rd)}

/* Loading */
.admin-loading{text-align:center;padding:60px;color:var(--mu);font-size:14px}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsivo */
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  .table-head,.table-row{grid-template-columns:50px 1fr 90px 80px}
  .table-head .th-iva,.table-row .td-iva,.table-head .th-ordem,.table-row .td-ordem{display:none}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-input{width:100%}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-n{font-size:22px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Oeste <span>Admin</span></div>
    <div class="login-sub">Painel de gestão de produtos</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    <button class="login-btn" onclick="fazerLogin()">Entrar →</button>
    <div class="login-err" id="login-err">Password incorreta</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <nav class="admin-nav">
    <div class="admin-nav-brand">Oeste <span>Admin</span></div>
    <div class="admin-nav-right">
      <a class="admin-nav-link" href="index.html" target="_blank">← Ver site</a>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </nav>

  <div class="admin-wrap">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-n" id="stat-total">—</div><div class="stat-l">Produtos totais</div></div>
      <div class="stat-card"><div class="stat-n" id="stat-ativos">—</div><div class="stat-l">Produtos ativos</div></div>
      <div class="stat-card"><div class="stat-n" id="stat-sem-img">—</div><div class="stat-l">Sem imagem</div></div>
      <div class="stat-card"><div class="stat-n" id="stat-marcas">—</div><div class="stat-l">Marcas</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-title">Produtos</div>
      <input class="search-input" type="text" placeholder="🔍 Pesquisar produto..." id="search-input" oninput="filtrarTabela()"/>
      <button class="btn-secondary" onclick="carregarProdutos()">↻ Atualizar</button>
      <button class="btn-primary" onclick="abrirModalNovo()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo produto
      </button>
    </div>

    <!-- Tabela -->
    <div class="table-wrap">
      <div class="table-head">
        <div>Foto</div>
        <div>Produto</div>
        <div>S/ IVA</div>
        <div class="th-iva">C/ IVA</div>
        <div>Estado</div>
        <div>Ações</div>
      </div>
      <div id="tabela-body">
        <div class="admin-loading"><div class="spin"></div>A carregar...</div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR/CRIAR -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Novo produto</div>
      <button class="btn-close-modal" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="form-id"/>
      <div class="form-grid">

        <div class="form-group form-full">
          <label class="form-label">Nome *</label>
          <input class="form-input" type="text" id="form-nome" placeholder="ex: DZ Hub 550 - Jetflex"/>
        </div>

        <div class="form-group">
          <label class="form-label">Marca</label>
          <input class="form-input" type="text" id="form-marca" placeholder="ex: PPA"/>
        </div>

        <div class="form-group">
          <label class="form-label">Categoria (tab)</label>
          <select class="form-select" id="form-tipo">
            <option value="correr">Portão de correr</option>
            <option value="batente">Portão de batente</option>
            <option value="garagem">Porta de garagem</option>
            <option value="acess">Acessórios</option>
            <option value="cctv2">CCTV</option>
            <option value="acesso">Controlo de acesso</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Preço s/ IVA (€) *</label>
          <input class="form-input" type="number" id="form-preco" placeholder="0.00" step="0.01" min="0"/>
        </div>

        <div class="form-group">
          <label class="form-label">Preço c/ IVA (€)</label>
          <input class="form-input" type="number" id="form-preco-iva" placeholder="Calculado auto (+23%)" step="0.01" min="0"/>
        </div>

        <div class="form-group">
          <label class="form-label">Preço instalador (€)</label>
          <input class="form-input" type="number" id="form-preco-inst" placeholder="0.00" step="0.01" min="0"/>
        </div>

        <div class="form-group">
          <label class="form-label">Ribbon / Badge</label>
          <input class="form-input" type="text" id="form-ribbon" placeholder="ex: Mais vendido"/>
        </div>

        <div class="form-group">
          <label class="form-label">Tags (separadas por vírgula)</label>
          <input class="form-input" type="text" id="form-tags" placeholder="ex: até 550kg, residencial"/>
        </div>

        <div class="form-group form-full">
          <label class="form-label">Descrição</label>
          <textarea class="form-textarea" id="form-desc" placeholder="Descrição técnica do produto..."></textarea>
        </div>

        <div class="form-group form-full">
          <label class="form-label">Imagem do produto</label>
          <div class="img-upload-area" onclick="document.getElementById('img-input').click()" id="upload-area"
               ondragover="event.preventDefault();this.classList.add('drag')"
               ondragleave="this.classList.remove('drag')"
               ondrop="handleDrop(event)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p>Clica para escolher ou arrasta a imagem aqui<br/><strong>PNG, JPG, WEBP</strong> até 5MB</p>
          </div>
          <input type="file" id="img-input" accept="image/*" onchange="previewImagem(this)"/>
          <img class="img-preview" id="img-preview" alt="Preview"/>
          <input type="hidden" id="form-img-url"/>
        </div>

        <div class="form-group">
          <label class="form-label">Tem app PPA ON?</label>
          <select class="form-select" id="form-app">
            <option value="false">Não</option>
            <option value="true">Sim</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Ativo no site?</label>
          <select class="form-select" id="form-ativo">
            <option value="true">Sim (visível)</option>
            <option value="false">Não (oculto)</option>
          </select>
        </div>

      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" id="btn-salvar" onclick="salvarProduto()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar produto
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const SUPA_URL = 'https://gpanomdrhvnqqdutdtfe.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYW5vbWRyaHZucXFkdXRkdGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTU5MTgsImV4cCI6MjA5Mjc5MTkxOH0.7OIm6W_MmFdASO3T6JfNw9wtv5o03ZxOkXt-Fu7PVSI';

// ⚠️ Coloca aqui a tua SERVICE ROLE KEY para fazer uploads de imagens
// Vai a: Supabase → Settings → API → service_role
const SERVICE_KEY = 'sb_secret_ofl3zMDL9XTxaaLZtmbQ1A_n7oNSX3Z';

// Password do admin (muda para algo seguro!)
const ADMIN_PASSWORD = 'oeste2026';

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function fazerLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_ok', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    carregarProdutos();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function fazerLogout() {
  sessionStorage.removeItem('admin_ok');
  location.reload();
}

// Verificar se já está autenticado
if (sessionStorage.getItem('admin_ok')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

// ═══════════════════════════════════════
// API
// ═══════════════════════════════════════
const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };
const headersService = { 'apikey': SERVICE_KEY, 'Authorization': `Bearer ${SERVICE_KEY}` };

let todosProdutos = [];

async function carregarProdutos() {
  document.getElementById('tabela-body').innerHTML = '<div class="admin-loading"><div class="spin"></div>A carregar...</div>';
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/produtos?select=*&order=ordem.asc`, { headers });
    if (!r.ok) throw new Error(await r.text());
    todosProdutos = await r.json();
    renderTabela(todosProdutos);
    atualizarStats(todosProdutos);
  } catch(e) {
    document.getElementById('tabela-body').innerHTML = `<div class="admin-loading" style="color:#DC2626">Erro: ${e.message}</div>`;
    toast('Erro a carregar produtos', 'err');
  }
}

function atualizarStats(produtos) {
  document.getElementById('stat-total').textContent = produtos.length;
  document.getElementById('stat-ativos').textContent = produtos.filter(p => p.ativo).length;
  document.getElementById('stat-sem-img').textContent = produtos.filter(p => !p.img_url).length;
  const marcas = new Set(produtos.map(p => p.marca).filter(Boolean));
  document.getElementById('stat-marcas').textContent = marcas.size;
}

function filtrarTabela() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderTabela(todosProdutos); return; }
  const filtrados = todosProdutos.filter(p =>
    (p.nome||'').toLowerCase().includes(q) ||
    (p.marca||'').toLowerCase().includes(q) ||
    (p.descricao||'').toLowerCase().includes(q)
  );
  renderTabela(filtrados);
}

function renderTabela(produtos) {
  if (!produtos.length) {
    document.getElementById('tabela-body').innerHTML = '<div class="admin-loading">Sem produtos.</div>';
    return;
  }
  document.getElementById('tabela-body').innerHTML = produtos.map(p => `
    <div class="table-row">
      <div>
        ${p.img_url
          ? `<img class="prod-thumb" src="${p.img_url}" alt="${p.nome}" onerror="this.style.opacity='.3'">`
          : `<div class="prod-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">📦</div>`}
      </div>
      <div class="prod-info">
        <div class="prod-nome">${p.nome}</div>
        <div class="prod-marca">${p.marca || '—'}</div>
      </div>
      <div>
        <div class="prod-preco">${p.preco_sem_iva ? p.preco_sem_iva.toFixed(2)+'€' : '—'}</div>
        <div class="prod-preco-lbl">s/ IVA</div>
      </div>
      <div class="td-iva">
        <div class="prod-preco">${p.preco_com_iva ? p.preco_com_iva.toFixed(2)+'€' : '—'}</div>
        <div class="prod-preco-lbl">c/ IVA</div>
      </div>
      <div>
        <span class="badge-ativo ${p.ativo ? 'sim' : 'nao'}">${p.ativo ? '✓ Ativo' : '✗ Oculto'}</span>
      </div>
      <div class="row-actions">
        <button class="btn-edit" onclick="abrirModalEditar(${p.id})">Editar</button>
        <button class="btn-toggle" onclick="toggleAtivo(${p.id}, ${p.ativo})" title="${p.ativo ? 'Ocultar' : 'Ativar'}">${p.ativo ? '👁' : '🚫'}</button>
        <button class="btn-del" onclick="apagarProduto(${p.id}, '${(p.nome||'').replace(/'/g,"\\'")}')">✕</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
// CRUD
// ═══════════════════════════════════════
async function salvarProduto() {
  const id = document.getElementById('form-id').value;
  const nome = document.getElementById('form-nome').value.trim();
  if (!nome) { toast('Nome é obrigatório', 'err'); return; }

  const precoBruto = parseFloat(document.getElementById('form-preco').value) || 0;
  const precoIva = parseFloat(document.getElementById('form-preco-iva').value) || +(precoBruto * 1.23).toFixed(2);
  const precoInst = parseFloat(document.getElementById('form-preco-inst').value) || 0;

  const tagsRaw = document.getElementById('form-tags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  const imgUrl = document.getElementById('form-img-url').value;

  // Upload imagem se houver ficheiro pendente
  let imgFinal = imgUrl;
  if (imagemPendente) {
    imgFinal = await uploadImagem(imagemPendente, nome);
    if (!imgFinal) return; // erro já mostrado
  }

  const dados = {
    nome,
    marca: document.getElementById('form-marca').value.trim(),
    tipo: document.getElementById('form-tipo').value,
    preco_sem_iva: precoBruto,
    preco_com_iva: precoIva,
    preco_instalador: precoInst,
    ribbon: document.getElementById('form-ribbon').value.trim(),
    descricao: document.getElementById('form-desc').value.trim(),
    tags,
    tem_app: document.getElementById('form-app').value === 'true',
    ativo: document.getElementById('form-ativo').value === 'true',
    img_url: imgFinal || '',
    atualizado_em: new Date().toISOString(),
  };

  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  btn.textContent = 'A guardar...';

  try {
    let r;
    if (id) {
      // Update
      r = await fetch(`${SUPA_URL}/rest/v1/produtos?id=eq.${id}`, {
        method: 'PATCH',
        headers: { ...headers, 'Prefer': 'return=representation' },
        body: JSON.stringify(dados)
      });
    } else {
      // Insert
      dados.ordem = todosProdutos.length + 1;
      r = await fetch(`${SUPA_URL}/rest/v1/produtos`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'return=representation' },
        body: JSON.stringify(dados)
      });
    }
    if (!r.ok) throw new Error(await r.text());
    fecharModal();
    carregarProdutos();
    toast(id ? '✓ Produto atualizado!' : '✓ Produto criado!', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar produto';
  }
}

async function toggleAtivo(id, estadoAtual) {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/produtos?id=eq.${id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ ativo: !estadoAtual })
    });
    if (!r.ok) throw new Error(await r.text());
    carregarProdutos();
    toast(estadoAtual ? 'Produto ocultado' : '✓ Produto ativado', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }
}

async function apagarProduto(id, nome) {
  if (!confirm(`Apagar "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/produtos?id=eq.${id}`, { method: 'DELETE', headers });
    if (!r.ok) throw new Error(await r.text());
    carregarProdutos();
    toast('Produto apagado', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }
}

// ═══════════════════════════════════════
// UPLOAD IMAGEM
// ═══════════════════════════════════════
let imagemPendente = null;

function previewImagem(input) {
  const file = input.files[0];
  if (!file) return;
  imagemPendente = file;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('img-preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.querySelector('#upload-area p').innerHTML = `<strong>${file.name}</strong> (${(file.size/1024).toFixed(0)}KB) — clica para mudar`;
  };
  reader.readAsDataURL(file);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-area').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { toast('Ficheiro inválido', 'err'); return; }
  const dt = new DataTransfer();
  dt.items.add(file);
  document.getElementById('img-input').files = dt.files;
  previewImagem(document.getElementById('img-input'));
}

async function uploadImagem(file, nomeProduto) {
  if (SERVICE_KEY === 'COLA_AQUI_A_SERVICE_ROLE_KEY') {
    toast('⚠️ Configura a SERVICE_KEY no admin.html para fazer upload de imagens', 'err');
    return null;
  }
  try {
    const ext = file.name.split('.').pop().toLowerCase();
    const nomeFicheiro = nomeProduto.toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,40) + '_' + Date.now() + '.' + ext;

    const r = await fetch(`${SUPA_URL}/storage/v1/object/imagens-produtos/${nomeFicheiro}`, {
      method: 'POST',
      headers: { ...headersService, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    if (!r.ok) throw new Error(await r.text());
    const url = `${SUPA_URL}/storage/v1/object/public/imagens-produtos/${nomeFicheiro}`;
    return url;
  } catch(e) {
    toast('Erro no upload: ' + e.message, 'err');
    return null;
  }
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function abrirModalNovo() {
  document.getElementById('modal-title').textContent = 'Novo produto';
  document.getElementById('form-id').value = '';
  document.getElementById('form-nome').value = '';
  document.getElementById('form-marca').value = 'PPA';
  document.getElementById('form-tipo').value = 'correr';
  document.getElementById('form-preco').value = '';
  document.getElementById('form-preco-iva').value = '';
  document.getElementById('form-preco-inst').value = '';
  document.getElementById('form-ribbon').value = '';
  document.getElementById('form-tags').value = '';
  document.getElementById('form-desc').value = '';
  document.getElementById('form-app').value = 'false';
  document.getElementById('form-ativo').value = 'true';
  document.getElementById('form-img-url').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.querySelector('#upload-area p').innerHTML = 'Clica para escolher ou arrasta a imagem aqui<br/><strong>PNG, JPG, WEBP</strong> até 5MB';
  imagemPendente = null;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('form-nome').focus(), 100);
}

function abrirModalEditar(id) {
  const p = todosProdutos.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-title').textContent = 'Editar produto';
  document.getElementById('form-id').value = p.id;
  document.getElementById('form-nome').value = p.nome || '';
  document.getElementById('form-marca').value = p.marca || '';
  document.getElementById('form-tipo').value = p.tipo || 'correr';
  document.getElementById('form-preco').value = p.preco_sem_iva || '';
  document.getElementById('form-preco-iva').value = p.preco_com_iva || '';
  document.getElementById('form-preco-inst').value = p.preco_instalador || '';
  document.getElementById('form-ribbon').value = p.ribbon || '';
  document.getElementById('form-tags').value = (p.tags || []).join(', ');
  document.getElementById('form-desc').value = p.descricao || '';
  document.getElementById('form-app').value = p.tem_app ? 'true' : 'false';
  document.getElementById('form-ativo').value = p.ativo ? 'true' : 'false';
  document.getElementById('form-img-url').value = p.img_url || '';

  if (p.img_url) {
    document.getElementById('img-preview').src = p.img_url;
    document.getElementById('img-preview').style.display = 'block';
    document.querySelector('#upload-area p').innerHTML = 'Imagem atual acima — clica para substituir<br/><strong>PNG, JPG, WEBP</strong> até 5MB';
  } else {
    document.getElementById('img-preview').style.display = 'none';
    document.querySelector('#upload-area p').innerHTML = 'Clica para escolher ou arrasta a imagem aqui<br/><strong>PNG, JPG, WEBP</strong> até 5MB';
  }
  imagemPendente = null;
  document.getElementById('modal-overlay').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  imagemPendente = null;
}

// Auto-calcular IVA
document.getElementById('form-preco').addEventListener('input', function() {
  const v = parseFloat(this.value);
  if (!isNaN(v) && !document.getElementById('form-preco-iva').value) {
    document.getElementById('form-preco-iva').value = (v * 1.23).toFixed(2);
  }
});

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function toast(msg, tipo='ok') {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${tipo} show`;
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Esc fecha modal
document.addEventListener('keydown', e => { if(e.key==='Escape') fecharModal(); });
</script>
